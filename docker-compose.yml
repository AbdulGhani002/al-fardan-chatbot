# Standalone compose for local dev.
# For VPS deployment alongside Redis + mailcow, merge this service into
# /root/al-fardan/docker-compose.yml (see scripts/vps-setup.sh in the CRM).
services:
  chatbot:
    build: .
    image: al-fardan-chatbot:latest
    container_name: al-fardan-chatbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Local-only — nginx reverse-proxies 443 → here.
      - "127.0.0.1:8001:8001"
    volumes:
      # ⚠️ ONLY persist runtime state here (SQLite chat history +
      # unanswered-query admin queue). NEVER mount a volume over
      # /app/app/data/ — that directory holds deploy-time artifacts
      # (KB source + the built TF-IDF index pickle) that must come
      # from the fresh image on every build, otherwise stale state
      # shadows new deploys.
      - chatbot-state:/app/app/state
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chatbot-state:
    driver: local
