# Standalone compose for local dev.
# For VPS deployment alongside Redis + mailcow, merge this service into
# /root/al-fardan/docker-compose.yml (see scripts/vps-setup.sh in the CRM).
services:
  chatbot:
    build: .
    image: al-fardan-chatbot:latest
    container_name: al-fardan-chatbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Local-only — nginx reverse-proxies 443 → here.
      - "127.0.0.1:8001:8001"
    volumes:
      # ⚠️ ONLY persist runtime state here (SQLite chat history +
      # unanswered-query admin queue). NEVER mount a volume over
      # /app/app/data/ — that directory holds deploy-time artifacts
      # (KB source + the built TF-IDF index pickle) that must come
      # from the fresh image on every build, otherwise stale state
      # shadows new deploys.
      - chatbot-state:/app/app/state
    depends_on:
      - ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    # Self-hosted LLM server (OpenAI-compat + native API). The chatbot
    # talks to it via http://ollama:11434 on the compose network. Only
    # the LLM runtime — models are pulled on first start via the
    # init command below.
    image: ollama/ollama:latest
    container_name: al-fardan-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    # Hard RAM cap — VPS is shared with mailcow + legalforge. Keep
    # us well clear of the OOM killer. Bump if a bigger model is used.
    mem_limit: 2500m
    mem_reservation: 1500m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  chatbot-state:
    driver: local
  ollama-models:
    driver: local
